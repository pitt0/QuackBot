name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@ec2-13-38-74-207.eu-west-3.compute.amazonaws.com "
            cd ~/quackbot &&
            git pull &&
            uv sync &&
            uv pip install -e . &&
            sudo systemctl restart quackbot.service
          "
